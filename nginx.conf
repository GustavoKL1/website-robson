# =========================================================================
# CONFIGURAÇÃO NGINX PARA DEPLOY EM SERVIDOR PRÓPRIO (VPS / DEDICADO)
# =========================================================================
# Salve este arquivo em: /etc/nginx/sites-available/delivery-container
# Depois crie o link simbólico correspondente em: /etc/nginx/sites-enabled/
# comando: ln -s /etc/nginx/sites-available/delivery-container /etc/nginx/sites-enabled/
# E recarregue o nginx: systemctl reload nginx
# =========================================================================

# Redirecionamento automático de port HTTP (80) para HTTPS (443)
server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # Localização de verificação para geração de certificado Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Configuração Principal do App Híbrido (React + Express) rodando via HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # =========================================================================
    # CERTIFICADOS SSL (Descomente e altere os caminhos após rodar o Certbot)
    # Comando sugerido: sudo certbot --nginx -d seu-dominio.com.br
    # =========================================================================
    # ssl_certificate /etc/letsencrypt/live/seu-dominio.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com.br/privkey.pem;
    
    # Parâmetros recomendados de segurança SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # =========================================================================
    # CABEÇALHOS DE SEGURANÇA (Segurança contra Injeções, Clickjacking, etc.)
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Tamanho máximo de upload (Essencial para uploads de fotos de containers e layouts em Base64/Imagens)
    client_max_body_size 12M;

    # Ativação da Compactação Gzip para carregamento instantâneo
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # =========================================================================
    # PROXY DIRETO PARA O SERVIDOR NODE.JS (Express rodando na porta 3000)
    # =========================================================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Cabeçalhos de repasse do cliente real (IP e Portas Originais)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout estendido para processos lentos ou uploads pesados
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }

    # =========================================================================
    # CONFIGURAÇÃO DE CACHE ADICIONAL PARA ARQUIVOS ESTÁTICOS
    # Facilita o trabalho do Node.js cacheando mídias diretamente no Nginx
    # =========================================================================
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|mp4|webm)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Logs de Acesso e Erro personalizados
    access_log /var/log/nginx/delivery_container_access.log;
    error_log /var/log/nginx/delivery_container_error.log warn;
}
